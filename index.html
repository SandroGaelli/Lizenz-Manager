<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lizenz-Verwaltung</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; max-width: 800px; margin: 0 auto; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .search-container { position: relative; }
        .search-container input { padding: 10px 10px 10px 35px; border-radius: 5px; border: 1px solid #ccc; width: 250px; }
        .search-container::before { content: '🔍'; position: absolute; left: 10px; top: 10px; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .form-group { display: flex; gap: 10px; margin-bottom: 15px; }
        input { padding: 10px; border: 1px solid #ccc; border-radius: 5px; flex: 1; }
        button { background-color: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #0056b3; }
        .license-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #eee; }
        .license-item:last-child { border-bottom: none; }
        .license-info h3 { margin: 0 0 5px 0; }
        .license-dates { font-size: 0.9em; color: #666; }
        .warning { color: #dc3545; font-weight: bold; }
        .delete-btn { background-color: #dc3545; padding: 5px 10px; }
        .delete-btn:hover { background-color: #c82333; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Lizenz-Dashboard</h1>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Lizenznamen suchen..." onkeyup="renderLicenses()">
        </div>
    </div>

    <div class="card">
        <h3>Neue Lizenz eintragen</h3>
        <form id="licenseForm">
            <div class="form-group">
                <input type="text" id="licName" placeholder="Name der Lizenz (z.B. Office 365)" required>
            </div>
            <div class="form-group">
                <input type="date" id="startDate" title="Startdatum" required>
                <input type="date" id="endDate" title="Enddatum" required>
            </div>
            <button type="submit">➕ Add License</button>
        </form>
    </div>

    <div class="card">
        <h2>Aktive Lizenzen</h2>
        <div id="licenseList">
            </div>
    </div>

    <script>
        // Lade Lizenzen aus dem lokalen Speicher oder starte mit leerem Array
        let licenses = JSON.parse(localStorage.getItem('licenses')) || [];

        const form = document.getElementById('licenseForm');
        const licenseList = document.getElementById('licenseList');
        const searchInput = document.getElementById('searchInput');

        // Event Listener für das Hinzufügen
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            const newLicense = {
                id: Date.now(),
                name: document.getElementById('licName').value,
                startDate: document.getElementById('startDate').value,
                endDate: document.getElementById('endDate').value
            };
            licenses.push(newLicense);
            saveAndRender();
            form.reset();
        });

        // Lizenz löschen
        function deleteLicense(id) {
            licenses = licenses.filter(lic => lic.id !== id);
            saveAndRender();
        }

        function saveAndRender() {
            localStorage.setItem('licenses', JSON.stringify(licenses));
            renderLicenses();
        }

        function renderLicenses() {
            const searchTerm = searchInput.value.toLowerCase();
            licenseList.innerHTML = '';

            // Filtern (Suchfunktion)
            let filteredLicenses = licenses.filter(lic => 
                lic.name.toLowerCase().includes(searchTerm)
            );

            // Sortieren (Zuerst auslaufende oben)
            filteredLicenses.sort((a, b) => new Date(a.endDate) - new Date(b.endDate));

            filteredLicenses.forEach(lic => {
                const endDateObj = new Date(lic.endDate);
                const today = new Date();
                
                // Berechne Differenz in Tagen
                const diffTime = endDateObj - today;
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

                let warningHtml = '';
                if (diffDays <= 30 && diffDays >= 0) {
                    warningHtml = `<span class="warning">⚠️ Läuft in ${diffDays} Tagen ab! (Mail-Trigger)</span>`;
                } else if (diffDays < 0) {
                    warningHtml = `<span class="warning">❌ Abgelaufen!</span>`;
                }

                const div = document.createElement('div');
                div.className = 'license-item';
                div.innerHTML = `
                    <div class="license-info">
                        <h3>${lic.name}</h3>
                        <div class="license-dates">
                            Start: ${lic.startDate} | Ende: <strong>${lic.endDate}</strong><br>
                            ${warningHtml}
                        </div>
                    </div>
                    <button class="delete-btn" onclick="deleteLicense(${lic.id})">Löschen</button>
                `;
                licenseList.appendChild(div);
            });
        }

        // Initiales Laden
        renderLicenses();
    </script>
</body>
</html>
